<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행운의 숫자</title>
  <style>
    /* 흑백 모드 CSS 변수 정의 */
    :root {
      --bg: #f0f4ff;
      --text: #333;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --toggle-bg: #dde1f0;
      --toggle-text: #333;
    }

    /* 다크 모드 변수 재정의 */
    body.dark {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --accent: #818cf8;
      --accent-hover: #6366f1;
      --toggle-bg: #2e2e4e;
      --toggle-text: #e0e0e0;
    }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* height → min-height: 폼 추가로 콘텐츠가 뷰포트를 초과할 수 있어 변경 */
      min-height: 100vh;
      margin: 0;
      padding: 48px 16px;
      box-sizing: border-box;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
    }

    h1 {
      margin-bottom: 24px;
      color: var(--text);
    }

    /* 흑백 모드 토글 버튼 — 우측 상단 고정 */
    #mode-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 8px 16px;
      font-size: 14px;
      background-color: var(--toggle-bg);
      color: var(--toggle-text);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
    }

    #mode-toggle:hover {
      opacity: 0.85;
    }

    button {
      padding: 12px 28px;
      font-size: 16px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    #result {
      margin-top: 24px;
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
      min-height: 36px;
    }

    /* 문의 폼 섹션 */
    .contact-section {
      margin-top: 56px;
      width: 100%;
      max-width: 480px;
    }

    .contact-section h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* 폼 필드 공통 스타일 */
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group input,
    .form-group textarea {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--toggle-bg);
      border-radius: 6px;
      background-color: var(--toggle-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      font-family: sans-serif;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      /* 최소 높이: 짧은 메시지도 입력하기 편한 크기 */
      min-height: 100px;
    }

    /* 폼 제출 버튼 — 전체 너비 */
    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: 15px;
    }

    /* 제출 후 안내 메시지 */
    #form-status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--accent);
      min-height: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- 흑백 모드 토글 버튼 -->
  <button id="mode-toggle" onclick="toggleMode()">다크 모드</button>

  <h1>오늘의 행운의 숫자</h1>
  <button onclick="showLuckyNumber()">행운의 숫자 뽑기</button>
  <div id="result"></div>

  <!-- 문의 폼 — Formspree endpoint로 비동기 전송 -->
  <section class="contact-section" aria-label="문의하기">
    <h2>문의하기</h2>
    <form id="contact-form">
      <div class="form-group">
        <label for="contact-name">이름</label>
        <input type="text" id="contact-name" name="name" placeholder="홍길동" required>
      </div>
      <div class="form-group">
        <label for="contact-email">이메일</label>
        <input type="email" id="contact-email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label for="contact-message">메시지</label>
        <textarea id="contact-message" name="message" placeholder="문의 내용을 입력하세요." required></textarea>
      </div>
      <button type="submit" class="btn-submit">보내기</button>
      <p id="form-status" aria-live="polite"></p>
    </form>
  </section>

  <script>
    function showLuckyNumber() {
      // 1~100 사이의 무작위 정수를 행운의 숫자로 생성
      const lucky = Math.floor(Math.random() * 100) + 1;
      document.getElementById('result').textContent = '당신의 행운의 숫자: ' + lucky;
    }

    // 다크/라이트 모드 전환 — body에 dark 클래스 토글
    function toggleMode() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('mode-toggle').textContent = isDark ? '라이트 모드' : '다크 모드';
    }

    // Formspree 비동기 제출 — fetch API 사용
    document.getElementById('contact-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const form = e.target;
      const status = document.getElementById('form-status');

      // 버튼 비활성화로 중복 제출 방지
      const submitBtn = form.querySelector('.btn-submit');
      submitBtn.disabled = true;
      status.textContent = '전송 중...';

      try {
        const response = await fetch('https://formspree.io/f/xkoqgyne', {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(form)
        });

        if (response.ok) {
          status.textContent = '문의가 접수되었습니다. 감사합니다!';
          form.reset();
        } else {
          // Formspree 에러 응답 처리
          const data = await response.json();
          const msg = data.errors ? data.errors.map(err => err.message).join(', ') : '전송에 실패했습니다.';
          status.textContent = msg;
          submitBtn.disabled = false;
        }
      } catch (err) {
        status.textContent = '네트워크 오류가 발생했습니다. 다시 시도해 주세요.';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
